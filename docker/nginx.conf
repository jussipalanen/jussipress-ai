# Bedrock WordPress — nginx site config
# Document root: /var/www/html/web  (Bedrock convention)
# WordPress core:  /var/www/html/web/wp
# Uploads:         /var/www/html/web/app/uploads

server {
    listen 8080;
    root /var/www/html/web;
    index index.php;

    server_tokens off;
    client_max_body_size 64m;

    # --------------------------------------------------
    # Security — deny sensitive paths
    # --------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* /app/uploads/.*\.php$ {
        deny all;
    }

    # --------------------------------------------------
    # Static assets — long cache headers
    # --------------------------------------------------
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        log_not_found off;
        access_log off;
    }

    # --------------------------------------------------
    # Main WordPress rewrite
    # --------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # WordPress admin lives at /wp/wp-admin
    # ^~ prevents outer regex locations from matching, so PHP must be handled here too
    location ^~ /wp/ {
        try_files $uri $uri/ /wp/index.php?$args;

        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include        fastcgi_params;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param  PATH_INFO       $fastcgi_path_info;
            fastcgi_read_timeout 120s;
        }
    }

    # --------------------------------------------------
    # PHP-FPM
    # --------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 120s;
    }

    # --------------------------------------------------
    # Gzip
    # --------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        image/svg+xml;
}
