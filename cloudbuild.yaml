# Google Cloud Build — Kaniko image build + Cloud Run deploy
#
# Triggers:
#   - Any branch push: builds and pushes image (no deploy)
#   - Tag matching *-production: builds, pushes, and deploys to Cloud Run
#
# One-time trigger setup:
#   gcloud builds triggers create cloud-source-repositories \
#     --name=deploy-production \
#     --repo=jussipress-ai \
#     --tag-pattern=".*-production" \
#     --build-config=cloudbuild.yaml
#
# Required IAM roles for the Cloud Build service account
# (PROJECT_NUMBER@cloudbuild.gserviceaccount.com):
#   - roles/artifactregistry.writer      (push images)
#   - roles/storage.admin                (Kaniko layer cache in GCS)
#   - roles/run.admin                    (deploy to Cloud Run)
#   - roles/iam.serviceAccountUser       (act as Cloud Run service account)
#   - roles/secretmanager.secretAccessor (read secrets during deploy)
#
# Required IAM roles for the Cloud Run service account
# (PROJECT_NUMBER-compute@developer.gserviceaccount.com):
#   - roles/cloudsql.client              (connect to Cloud SQL via Unix socket)
#   - roles/secretmanager.secretAccessor (read secrets at runtime)
#
# One-time secret setup:
#   echo -n "jussipress"  | gcloud secrets create DB_NAME     --data-file=-
#   echo -n "value"       | gcloud secrets create DB_USER     --data-file=-
#   echo -n "value"       | gcloud secrets create DB_PASSWORD --data-file=-
#   echo -n "value"       | gcloud secrets create AUTH_KEY          --data-file=-
#   echo -n "value"       | gcloud secrets create SECURE_AUTH_KEY   --data-file=-
#   echo -n "value"       | gcloud secrets create LOGGED_IN_KEY     --data-file=-
#   echo -n "value"       | gcloud secrets create NONCE_KEY         --data-file=-
#   echo -n "value"       | gcloud secrets create AUTH_SALT         --data-file=-
#   echo -n "value"       | gcloud secrets create SECURE_AUTH_SALT  --data-file=-
#   echo -n "value"       | gcloud secrets create LOGGED_IN_SALT    --data-file=-
#   echo -n "value"       | gcloud secrets create NONCE_SALT        --data-file=-
#
#   Note: DB_HOST is NOT a secret — it is derived from _CLOUDSQL_INSTANCE at deploy time.
#
# Grant Cloud Run service account access to each secret:
#   export SA="PROJECT_NUMBER-compute@developer.gserviceaccount.com"
#   for secret in DB_NAME DB_USER DB_PASSWORD \
#     AUTH_KEY SECURE_AUTH_KEY LOGGED_IN_KEY NONCE_KEY \
#     AUTH_SALT SECURE_AUTH_SALT LOGGED_IN_SALT NONCE_SALT; do
#     gcloud secrets add-iam-policy-binding $secret \
#       --member="serviceAccount:$SA" \
#       --role="roles/secretmanager.secretAccessor"
#   done
#
# One-time Artifact Registry setup:
#   gcloud artifacts repositories create $_REPO \
#     --repository-format=docker \
#     --location=$_REGION \
#     --description="JussiPress AI images"

substitutions:
  _REGION: europe-north1
  _REPO: jussipress-ai
  _IMAGE: app
  _SERVICE: jussipress-ai-production                     # Cloud Run service name
  _DOMAIN: ''              # set in trigger
  _CLOUDSQL_INSTANCE: ''   # set in trigger: PROJECT_ID:region:instance
  _DEPLOY: 'false'         # overridden to 'true' by the *-production tag trigger
  _DB_NAME: ''             # set in trigger
  _DB_USER: ''             # set in trigger

steps:
  # --------------------------------------------------------
  # Build & push with Kaniko (no Docker daemon needed)
  # Kaniko reads source from /workspace (Cloud Build mount).
  # Layer cache is stored in Artifact Registry under /cache.
  # $TAG_NAME is set automatically by Cloud Build when triggered
  # by a Git tag; empty string on branch-push triggers.
  # --------------------------------------------------------
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=Dockerfile
      - --context=dir:///workspace
      - --destination=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:$COMMIT_SHA
      - --destination=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:latest
      # Kaniko layer cache — reuses layers between builds
      - --cache=true
      - --cache-repo=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/cache
      - --cache-ttl=72h
      # Faster snapshotting
      - --snapshot-mode=redo
      - --use-new-run

  # --------------------------------------------------------
  # Deploy to Cloud Run — runs only when $_DEPLOY=true
  # Set by the *-production tag trigger substitution.
  # Scales to zero by default → minimal cost when idle.
  #
  # Cloud SQL connection: --add-cloudsql-instances makes the
  # Unix socket available at /cloudsql/<instance-connection-name>
  # DB_HOST is set to that socket path so WordPress connects
  # without exposing a public IP.
  # --------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        if [ "$_DEPLOY" = "true" ]; then
          gcloud run deploy $_SERVICE \
            --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:$COMMIT_SHA \
            --region=$_REGION \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --memory=1Gi \
            --cpu=1 \
            --port=8080 \
            --add-cloudsql-instances=$_CLOUDSQL_INSTANCE \
            --set-env-vars="\
            WP_ENV=production,\
            WP_HOME=https://$_DOMAIN,\
            WP_SITEURL=https://$_DOMAIN/wp,\
            DB_HOST=/cloudsql/$_CLOUDSQL_INSTANCE,\
            DB_NAME=$_DB_NAME,\
            DB_USER=$_DB_USER" \
            --set-secrets="\
            DB_PASSWORD=JUSSIPRESS_AI_DB_PASSWORD:latest,\
            AUTH_KEY=JUSSIPRESS_AI_AUTH_KEY:latest,\
            SECURE_AUTH_KEY=JUSSIPRESS_AI_SECURE_AUTH_KEY:latest,\
            LOGGED_IN_KEY=JUSSIPRESS_AI_LOGGED_IN_KEY:latest,\
            NONCE_KEY=JUSSIPRESS_AI_NONCE_KEY:latest,\
            AUTH_SALT=JUSSIPRESS_AI_AUTH_SALT:latest,\
            SECURE_AUTH_SALT=JUSSIPRESS_AI_SECURE_AUTH_SALT:latest,\
            LOGGED_IN_SALT=JUSSIPRESS_AI_LOGGED_IN_SALT:latest,\
            NONCE_SALT=JUSSIPRESS_AI_NONCE_SALT:latest"
        else
          echo "Skipping deploy (_DEPLOY=$_DEPLOY). Push a *-production tag to deploy."
        fi

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:latest

timeout: '1800s'   # 30 min — first build (no cache) takes ~10-15 min; default 10 min is too short

options:
  machineType: E2_MEDIUM     # 2 vCPU — sufficient within the 30 min timeout; cheapest option
logging: CLOUD_LOGGING_ONLY
