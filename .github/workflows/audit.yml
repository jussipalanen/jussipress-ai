name: Dependency audit

on:
  push:
    branches: [master]
    paths:
      - composer.lock
      - web/app/themes/jussipress-theme/package-lock.json
  pull_request:
    branches: [master]
    paths:
      - composer.lock
      - web/app/themes/jussipress-theme/package-lock.json
  # Run weekly to catch newly published advisories even without code changes
  schedule:
    - cron: '0 8 * * 1'  # Mondays at 08:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # PHP — composer audit (reads composer.lock, no install needed)
  # ============================================================
  php-audit:
    name: PHP vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Audit PHP dependencies
        run: composer audit --format=table

  # ============================================================
  # JS — npm audit (reads package-lock.json, no install needed)
  # ============================================================
  js-audit:
    name: JS vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Audit JS dependencies
        # --audit-level=high — fail on HIGH and CRITICAL only.
        # Dev-only moderate/low advisories are common and rarely exploitable in build tools.
        run: npm audit --audit-level=high
        working-directory: web/app/themes/jussipress-theme
